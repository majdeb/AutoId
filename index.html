<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Calculator</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">

    <h2>Calculate Sequential Times</h2>
    
    <label for="startTime">Select Start Time:</label>
    <input type="time" id="startTime" value="12:00">
    
    <button onclick="calculateNewTimes()">Calculate</button>

    <h3 id="result"></h3>

    <script>
        function calculateNewTimes() {
            // 1. Get the input value
            const inputVal = document.getElementById('startTime').value;
            
            if (!inputVal) {
                alert("Please select a valid time.");
                return;
            }

            // 2. Separate hours and minutes
            let [startHours, startMinutes] = inputVal.split(':').map(Number);

            // 3. Helper function to format and handle clock rollover (24 hours)
            const formatTime = (h, m) => {
                let totalMin = m % 60;
                let carryHr = Math.floor(m / 60);
                
                let finalMin = totalMin < 0 ? totalMin + 60 : totalMin;
                let finalHr = totalMin < 0 ? (h + carryHr - 1) % 24 : (h + carryHr) % 24;
                
                // Ensure hours also handle negative rollovers
                if (finalHr < 0) finalHr += 24;

                return `${String(finalHr).padStart(2, '0')}:${String(finalMin).padStart(2, '0')}`;
            };

            // 4. Calculate Time 2: Input time + 7h 30m
            let t2Hours = startHours + 7;
            let t2Minutes = startMinutes + 30;
            let time2 = formatTime(t2Hours, t2Minutes);

            // 5. Calculate Time 3: Time 2 - 5m
            // Splitting Time 2 back into its calculated H & M to cleanly subtract
            let [t2FinalHours, t2FinalMinutes] = time2.split(':').map(Number);
            let time3 = formatTime(t2FinalHours, t2FinalMinutes - 5);

            // 6. Output the results
            const resultString = `
                Start Time: ${inputVal} <br>
                End Time (+7h 30m): ${time2} <br>
                Eligible leave time (-5m from End Time): ${time3}
            `;
            document.getElementById('result').innerHTML = resultString;
        }
    </script>
</body>
</html>
